services:
  # 1. 資料庫
  db:
    image: postgres:latest
    container_name: contact-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: contact_list
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - my-app-network # 加入網路

  # 2. Node.js 後端 API
  app:
    build: .
    container_name: contact-api
    restart: always
    environment:
      DB_HOST: db
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: contact_list
    depends_on:
      - db
    networks:
      - my-app-network # 加入網路

  # 3. Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: contact-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - my-app-network # 加入網路

# 定義網路
networks:
  my-app-network:
    driver: bridge